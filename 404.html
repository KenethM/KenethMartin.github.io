<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'MS Sans Serif', 'Microsoft Sans Serif', Arial, sans-serif;
      font-size: 13px;
      background: #021822;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .dialog {
      background: #c0c0c0;
      border: 2px solid;
      border-color: #fff #808080 #808080 #fff;
      outline: 1px solid #000;
      width: 420px;
    }
    .titlebar {
      background: linear-gradient(to right, #000080, #1084d0);
      color: #fff;
      font-weight: bold;
      font-size: 13px;
      padding: 4px 6px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .titlebar span { flex: 1; }
    .body {
      padding: 20px;
      display: flex;
      gap: 16px;
      align-items: flex-start;
    }
    .icon { font-size: 36px; flex-shrink: 0; line-height: 1; }
    .msg { line-height: 1.7; color: #000; }
    .msg strong { display: block; margin-bottom: 6px; font-size: 14px; }
    .actions {
      padding: 10px 20px 16px;
      display: flex;
      justify-content: center;
      gap: 8px;
    }
    .btn {
      background: #c0c0c0;
      border: 2px solid;
      border-color: #fff #808080 #808080 #fff;
      outline: 1px solid #000;
      padding: 4px 24px;
      font-size: 13px;
      font-family: inherit;
      cursor: pointer;
    }
    .btn:active { border-color: #808080 #fff #fff #808080; }
  </style>
</head>
<body>
  <div class="dialog">
    <div class="titlebar">
      <span>Error</span>
    </div>
    <div class="body">
      <div class="icon">⚠️</div>
      <div class="msg">
        <strong>404 — Page Not Found</strong>
        The file or directory you requested does not exist or has been moved.
        <br /><br />
        Check the URL and try again, or return to the desktop.
      </div>
    </div>
    <div class="actions">
      <button class="btn" onclick="location.href='/'">OK</button>
    </div>
  </div>
</body>
</html>
